<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pink Love Secure Chat</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: url('https://img.freepik.com/free-vector/hand-drawn-valentine-s-day-background_23-2148811802.jpg') center center fixed; 
            background-size: cover; 
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; 
        }
        .box { background: rgba(255, 255, 255, 0.95); padding: 20px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(255, 105, 180, 0.3); }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 15px; border: 2px solid #ffb6c1; box-sizing: border-box; outline: none; }
        button { background: #ff1493; color: white; border: none; cursor: pointer; font-weight: bold; }
        
        #chatSection { display: none; height: 80vh; flex-direction: column; }
        
        #messages { flex: 1; overflow-y: auto; padding: 10px; background: rgba(255, 240, 245, 0.9); border-radius: 15px; margin-bottom: 10px; gap: 8px; display: flex; flex-direction: column; }
        .msg-container { padding: 8px 12px; border-radius: 15px; max-width: 80%; word-wrap: break-word; font-size: 14px; position: relative; text-align: left; }
        .sent { background: #ff69b4; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .received { background: #fff; color: #333; border: 1px solid #ffb6c1; align-self: flex-start; border-bottom-left-radius: 2px; }
        img, video { max-width: 150px; border-radius: 10px; display: block; margin-top: 5px; }
        .msg-info { font-size: 10px; font-weight: bold; margin-bottom: 2px; }
        .chat-footer { display: flex; gap: 5px; align-items: center; }
    </style>
</head>
<body>

<div id="authBox" class="box">
    <h2 id="authTitle" style="color: #ff1493;">Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button id="authBtn" onclick="handleAuth()">Enter Chat</button>
    <p id="toggleText" style="cursor:pointer; font-size: 12px; color: #ff1493;" onclick="toggleAuth()">Don't have an account? Sign Up</p>
</div>

<div id="chatSection" class="box">
    <div id="header-chat" style="display: flex; justify-content: space-between; align-items: center;">
        <h3 id="chatTitle" style="margin: 0; color: #ff1493;">Chat</h3>
        <button onclick="logout()" style="width: 80px; padding: 6px;">Logout</button>
    </div>
    
    <div id="messages"></div>
    <select id="userSelector" style="display:none;"></select>
    
    <!-- WhatsApp Jaisa Video Preview Box (Shuru mein hidden rahega) -->
    <div id="videoPreviewContainer" style="display:none; background: #fff0f5; padding: 10px; border-radius: 15px; border: 1px solid #ffb6c1; margin-bottom: 10px; text-align: center;">
        <video id="videoPreview" width="180" controls style="border-radius: 10px; max-height: 120px; margin: 0 auto;"></video>
        <div style="display: flex; gap: 5px; margin-top: 8px;">
            <button id="cancelVideoBtn" style="background: #ff4d4d; margin: 0; padding: 8px;">Cancel</button>
            <button id="confirmSendBtn" style="background: #28a745; margin: 0; padding: 8px;">Send Video</button>
        </div>
    </div>
    
    <div class="chat-footer">
        <input type="text" id="msgInput" placeholder="Message..." style="margin: 0;">
        
        <!-- Alag inputs taaki Photo Firebase jaye aur Video Cloudinary -->
        <input type="file" id="photoInput" accept="image/*" style="display: none;" onchange="handlePhotoUpload(this)">
        <input type="file" id="videoInput" accept="video/*" style="display: none;">
        
        <!-- Photo Button (Firebase) -->
        <button type="button" onclick="document.getElementById('photoInput').click()" style="width: 40px; margin: 0;" title="Send Photo">📷</button>
        
        <!-- Video Button (Cloudinary Preview) -->
        <button type="button" onclick="document.getElementById('videoInput').click()" style="width: 40px; margin: 0;" title="Send Video">📹</button>
        
        <button id="sendBtn" onclick="sendMessage()" style="width: 60px; margin: 0;">Send</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, onValue, set, get, child } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";
    import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-storage.js";

    const app = initializeApp({ databaseURL: "https://chat-with-vipul-default-rtdb.firebaseio.com", storageBucket: "chat-with-vipul.appspot.com" });
    const db = getDatabase(app);
    const storage = getStorage(app);

    let currentUser = localStorage.getItem("user");
    let isLoginMode = true;
    const ADMIN_NAME = "Vipul";
    const displayedMessages = new Set();
    let selectedVideoFile = null;

    if (currentUser) {
        document.getElementById("authBox").style.display = "none";
        document.getElementById("chatSection").style.display = "flex";
        startChat();
    }

    window.toggleAuth = () => {
        isLoginMode = !isLoginMode;
        document.getElementById("authTitle").innerText = isLoginMode ? "Login" : "Sign Up";
        document.getElementById("authBtn").innerText = isLoginMode ? "Enter Chat" : "Create Account";
        document.getElementById("toggleText").innerText = isLoginMode ? "Don't have an account? Sign Up" : "Already have an account? Login";
    };

    window.handleAuth = () => {
        const u = document.getElementById("username").value.trim();
        const p = document.getElementById("password").value.trim();
        if (!u || !p) { alert("Please fill in both fields!"); return; }

        if (isLoginMode) {
            if (u === ADMIN_NAME && p === "Vipul123") { 
                currentUser = ADMIN_NAME; 
                completeLogin(); 
            } else { 
                get(child(ref(db), `users/${u}`)).then((s) => { 
                    if (s.exists() && s.val().password === p) { 
                        currentUser = u; 
                        completeLogin(); 
                    } else { 
                        alert("Invalid username or password!"); 
                    } 
                }); 
            }
        } else {
            set(ref(db, 'users/' + u), { name: u, password: p }).then(() => { 
                alert("Account created successfully! Please login."); 
                toggleAuth(); 
            });
        }
    };

    window.logout = () => {
        localStorage.removeItem("user");
        location.reload();
    };

    function completeLogin() {
        localStorage.setItem("user", currentUser);
        document.getElementById("authBox").style.display = "none";
        document.getElementById("chatSection").style.display = "flex";
        startChat();
    }

    function startChat() {
        document.getElementById("chatTitle").innerText = "Hi, " + currentUser;
        if(currentUser === ADMIN_NAME) {
            document.getElementById("userSelector").style.display = "block";
            onValue(ref(db, 'users/'), (snapshot) => {
                const sel = document.getElementById("userSelector");
                sel.innerHTML = '<option value="">-- Select User --</option>';
                snapshot.forEach(childSnap => {
                    const name = childSnap.val().name;
                    if(name && name !== ADMIN_NAME) {
                        const opt = document.createElement("option");
                        opt.value = name; opt.innerText = name;
                        sel.appendChild(opt);
                    }
                });
            });
        }
        
        onChildAdded(ref(db, 'messages/'), (snapshot) => {
            const data = snapshot.val();
            const id = snapshot.key;
            if (displayedMessages.has(id)) return;
            if (currentUser === ADMIN_NAME || data.sender === currentUser || data.receiver === currentUser) {
                const div = document.createElement("div");
                div.className = `msg-container ${(data.sender === currentUser) ? "sent" : "received"} `;
                
                let mediaHtml = '';
                if (data.image) mediaHtml += `<img src="${data.image}">`;
                if (data.video) mediaHtml += `<video src="${data.video}" controls></video>`;

                div.innerHTML = `<div class="msg-info">${data.sender}</div>${data.text ? '<div>' + data.text + '</div>' : ''}${mediaHtml}<div style="font-size:9px; text-align:right; margin-top:3px; opacity:0.7;">${data.time || ''}</div>`;
                document.getElementById("messages").appendChild(div);
                displayedMessages.add(id);
                const msgContainer = document.getElementById("messages");
                msgContainer.scrollTop = msgContainer.scrollHeight;
            }
        });
    }

    window.sendMessage = () => {
        const msg = document.getElementById("msgInput").value.trim();
        const receiver = (currentUser === ADMIN_NAME) ? document.getElementById("userSelector").value : ADMIN_NAME;
        if(!msg || (currentUser === ADMIN_NAME && !receiver)) { alert("Please select a user and type a message!"); return; }
        
        push(ref(db, 'messages/'), { 
            text: msg, 
            sender: currentUser, 
            receiver: receiver, 
            time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) 
        });
        document.getElementById("msgInput").value = "";
    };

    // 1. Photo Upload (Firebase Storage)
    window.handlePhotoUpload = function(input) {
        const file = input.files[0];
        if (!file) return;

        const receiver = (currentUser === ADMIN_NAME) ? document.getElementById("userSelector").value : ADMIN_NAME;
        if (currentUser === ADMIN_NAME && !receiver) {
            alert("Please select a user first!");
            input.value = "";
            return;
        }

        const fileRef = storageRef(storage, 'chat_photos/' + Date.now() + '_' + file.name);
        uploadBytes(fileRef, file).then(snapshot => {
            getDownloadURL(snapshot.ref).then(downloadURL => {
                push(ref(db, 'messages/'), {
                    image: downloadURL,
                    sender: currentUser,
                    receiver: receiver,
                    time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
                });
                input.value = "";
            });
        }).catch(err => {
            console.error(err);
            alert("Photo upload failed.");
            input.value = "";
        });
    };

    // 2. Video Preview & Cloudinary Upload Logic
    const videoInput = document.getElementById('videoInput');
    const videoPreviewContainer = document.getElementById('videoPreviewContainer');
    const videoPreview = document.getElementById('videoPreview');
    const confirmSendBtn = document.getElementById('confirmSendBtn');
    const cancelVideoBtn = document.getElementById('cancelVideoBtn');

    videoInput.addEventListener('change', (e) => {
        selectedVideoFile = e.target.files[0];
        const receiver = (currentUser === ADMIN_NAME) ? document.getElementById("userSelector").value : ADMIN_NAME;
        if (currentUser === ADMIN_NAME && !receiver) {
            alert("Please select a user first before selecting a video!");
            videoInput.value = "";
            return;
        }

        if (selectedVideoFile) {
            const fileURL = URL.createObjectURL(selectedVideoFile);
            videoPreview.src = fileURL;
            videoPreviewContainer.style.display = 'block'; // WhatsApp jaisa preview dikhega
        }
    });

    confirmSendBtn.addEventListener('click', () => {
        if (!selectedVideoFile) return;

        const receiver = (currentUser === ADMIN_NAME) ? document.getElementById("userSelector").value : ADMIN_NAME;
        confirmSendBtn.innerText = "Sending...";
        confirmSendBtn.disabled = true;

        const CLOUD_NAME = "fmr7awgf";
        const UPLOAD_PRESET = "vipul storage";

        const formData = new FormData();
        formData.append("file", selectedVideoFile);
        formData.append("upload_preset", UPLOAD_PRESET);

        fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`, {
            method: "POST",
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            if (data.secure_url) {
                push(ref(db, 'messages/'), {
                    video: data.secure_url,
                    sender: currentUser,
                    receiver: receiver,
                    time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
                });
                resetVideoForm();
            } else {
                alert("Cloudinary upload failed!");
                resetVideoForm();
            }
        })
        .catch(error => {
            console.error("Error:", error);
            alert("Something went wrong during video upload.");
            resetVideoForm();
        });
    });

    cancelVideoBtn.addEventListener('click', () => {
        resetVideoForm();
    });

    function resetVideoForm() {
        selectedVideoFile = null;
        videoInput.value = "";
        videoPreview.src = "";
        videoPreviewContainer.style.display = 'none';
        confirmSendBtn.innerText = "Send Video";
        confirmSendBtn.disabled = false;
    }
</script>
</body>
</html>
