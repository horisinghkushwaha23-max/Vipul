<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pink Love Secure Chat</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            /* Naya optimized wallpaper link */
            background: url('https://img.freepik.com/free-vector/hand-drawn-valentine-s-day-background_23-2148811802.jpg') center center fixed; 
            background-size: cover; 
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; 
        }
        .box { background: rgba(255, 255, 255, 0.95); padding: 20px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(255, 105, 180, 0.3); }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 15px; border: 2px solid #ffb6c1; box-sizing: border-box; outline: none; }
        button { background: #ff1493; color: white; border: none; cursor: pointer; font-weight: bold; }
        
        /* Chat screen height wapas normal aur balanced */
        #chatSection { display: none; height: 80vh; flex-direction: column; }
        
        #messages { flex: 1; overflow-y: auto; padding: 10px; background: rgba(255, 240, 245, 0.9); border-radius: 15px; margin-bottom: 10px; gap: 8px; display: flex; flex-direction: column; }
        .msg-container { padding: 8px 12px; border-radius: 15px; max-width: 80%; word-wrap: break-word; font-size: 14px; position: relative; }
        .sent { background: #ff69b4; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .received { background: #fff; color: #333; border: 1px solid #ffb6c1; align-self: flex-start; border-bottom-left-radius: 2px; }
        img { max-width: 150px; border-radius: 10px; display: block; margin-top: 5px; }
        .msg-info { font-size: 10px; font-weight: bold; margin-bottom: 2px; }
    </style>
</head>
<body>

<div id="authBox" class="box">
    <h2 id="authTitle" style="color: #ff1493;">Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button id="authBtn" onclick="handleAuth()">Enter Chat</button>
    <p id="toggleText" style="cursor:pointer; font-size: 12px;" onclick="toggleAuth()">Don't have an account? Sign Up</p>
</div>

<div id="chatSection" class="box">
    <div id="header-chat"><h3 id="chatTitle">Chat</h3><button onclick="logout()">Logout</button></div>
    <div id="messages"></div>
    <select id="userSelector" style="display:none;"></select>
    <div style="display: flex; gap: 5px;">
        <input type="text" id="msgInput" placeholder="Message...">
        <input type="file" id="imgInput" accept="image/*" style="display:none;" onchange="sendImage()">
        <button onclick="document.getElementById('imgInput').click()" style="width: 50px;">📷</button>
        <button onclick="sendMessage()" style="width: 70px;">Send</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, onValue, set, get, child } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

    const db = getDatabase(initializeApp({ databaseURL: "https://chat-with-vipul-default-rtdb.firebaseio.com" }));
    let currentUser = localStorage.getItem("user");
    let isLoginMode = true;
    const ADMIN_NAME = "Vipul";
    const displayedMessages = new Set();

    window.toggleAuth = () => {
        isLoginMode = !isLoginMode;
        document.getElementById("authTitle").innerText = isLoginMode ? "Login" : "Sign Up";
        document.getElementById("authBtn").innerText = isLoginMode ? "Enter Chat" : "Create Account";
    };

    window.handleAuth = () => {
        const u = document.getElementById("username").value.trim();
        const p = document.getElementById("password").value.trim();
        if (isLoginMode) {
            if (u === "Vipul" && p === "Vipul123") { currentUser = ADMIN_NAME; completeLogin(); }
            else { get(child(ref(db), `users/${u}`)).then((s) => { if (s.exists() && s.val().password === p) { currentUser = u; completeLogin(); } else { alert("Invalid!"); } }); }
        } else {
            set(ref(db, 'users/' + u), { name: u, password: p }).then(() => { alert("Created!"); toggleAuth(); });
        }
    };

    function completeLogin() {
        localStorage.setItem("user", currentUser);
        document.getElementById("authBox").style.display = "none";
        document.getElementById("chatSection").style.display = "flex";
        startChat();
    }

    function startChat() {
        document.getElementById("chatTitle").innerText = "Hi, " + currentUser;
        if(currentUser === ADMIN_NAME) {
            document.getElementById("userSelector").style.display = "block";
            onValue(ref(db, 'users/'), (snapshot) => {
                const sel = document.getElementById("userSelector");
                sel.innerHTML = '<option value="">-- Select User --</option>';
                snapshot.forEach(childSnap => {
                    const name = childSnap.val().name;
                    if(name && name !== ADMIN_NAME) {
                        const opt = document.createElement("option");
                        opt.value = name; opt.innerText = name;
                        sel.appendChild(opt);
                    }
                });
            });
        }
        
        onChildAdded(ref(db, 'messages/'), (snapshot) => {
            const data = snapshot.val();
            const id = snapshot.key;
            if (displayedMessages.has(id)) return;
            if (currentUser === ADMIN_NAME || data.sender === currentUser || data.receiver === currentUser) {
                const div = document.createElement("div");
                div.className = `msg-container ${(data.sender === currentUser) ? "sent" : "received"}`;
                let imgHtml = data.image ? `<img src="${data.image}">` : '';
                div.innerHTML = `<div class="msg-info">${data.sender}</div>${data.text || ''}${imgHtml}<div style="font-size:9px;">${data.time || ''}</div>`;
                document.getElementById("messages").appendChild(div);
                displayedMessages.add(id);
                document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
            }
        });
    }

    window.sendMessage = () => {
        const msg = document.getElementById("msgInput").value.trim();
        const receiver = (currentUser === ADMIN_NAME) ? document.getElementById("userSelector").value : ADMIN_NAME;
        if(!msg || (currentUser === ADMIN_NAME && !receiver)) { alert("Select user/msg empty!"); return; }
        push(ref(db, 'messages/'), { text: msg, sender: currentUser, receiver: receiver, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) });
        document.getElementById("msgInput").value = "";
    };

    window.sendImage = () => {
        const file = document.getElementById('imgInput').files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            const receiver = (currentUser === ADMIN_NAME) ? document.getElementById("userSelector").value : ADMIN_NAME;
            if (currentUser === ADMIN_NAME && !receiver) { alert("Select user first!"); return; }
            push(ref(db, 'messages/'), { image: e.target.result, sender: currentUser, receiver: receiver, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) });
        };
        reader.readAsDataURL(file);
    };

    window.logout = () => { localStorage.removeItem("user"); location.reload(); };
    window.onload = () => { if(currentUser) completeLogin(); };
</script>
</body>
</html>
